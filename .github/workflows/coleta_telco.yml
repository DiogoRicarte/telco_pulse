name: Bot de Coleta Telco-Pulse

# Se uma requisição for feita para rodar o workflow enquanto ele já estiver rodando, a execução anterior será cancelada e a nova execução começará. Isso é útil para evitar que múltiplas execuções do mesmo workflow sejam feitas ao mesmo tempo, o que pode causar problemas de concorrência ou sobrecarga no sistema.
concurrency:
  group: coleta-dados
  cancel-in-progress: true

# Define QUANDO o robô vai rodar
on:
  schedule:
    # Roda a cada 50m (sintaxe do cron do Linux)
    - cron: '50 * * * *'
  # Permite que clique em um botão para rodar manualmente 
  workflow_dispatch:

jobs:
  coletar_dados:
    runs-on: self-hosted 
    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rodar o Sensor e Enviar para AWS
      env: # Puxa as senhas do cofre do GitHub e injeta no código
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      run: |
        python src/collector.py
