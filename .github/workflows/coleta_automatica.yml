name: Bot de Coleta Telco-Pulse

# Define QUANDO o robô vai rodar
on:
  schedule:
    # Roda a cada 1h (sintaxe do cron do Linux)
    - cron: '50 * * * *'
  # Permite que você clique em um botão para rodar manualmente se quiser
  workflow_dispatch:

jobs:
  coletar_dados:
    runs-on: self-hosted # Roda em um servidor que você controla (pode ser o seu PC, por exemplo)
    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rodar o Sensor e Enviar para AWS
      env: # Puxa as senhas do cofre do GitHub e injeta no código
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      run: |
        python src/collector.py
